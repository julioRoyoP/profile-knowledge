# Sube el nivel de log de la demo a DEBUG para que se vea todo el ciclo del
# outbox por consola: el relay reclamando eventos y el dispatcher entregándolos.
logging.level.dev.julioroyo.knowledge.outbox=DEBUG

# Patrón de log compacto para que el flujo se lea con claridad.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{0} - %msg%n
